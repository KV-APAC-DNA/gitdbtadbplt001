models:
  - name: EDW_PEFECT_STORE_KPI_DATA
    columns:
      - name: country
        tests:
          - accepted_values:
              values: ['Taiwan', 'Hong Kong', 'Korea']
      - name: state
        tests:
          - not_null:
            config:
              severity: error
              error_if: ">1000000"
              warn_if: ">50000"
